spring.application.name=consumer-sms

# Port cho server
server.port=8023

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=sms
spring.rabbitmq.password=sms@123

# Optional - rabbitmq
spring.rabbitmq.virtual-host=/
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=10
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# exchange - routing key
app.rabbitmq.exchange=sms-exchange
app.rabbitmq.queue=sms-queue
app.rabbitmq.routing-key=sms-routing-key
app.rabbitmq.queue.delay=sms-queue-delay

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# Optional - redis
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

secret.key=5c6b322e-5d49-4ac3-9fab-1f2d9f3322d1

# Database
spring.datasource.url=jdbc:postgresql://localhost:5332/postgres?sslmode=disable
spring.datasource.username=smsgw
spring.datasource.password=smsgw
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Retry
sms.retry.max-attempts=3
sms.retry.delay=1000

# Tps
sms.tps=1